<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center p-margin-mobile">
<main class="w-full max-w-md bg-surface-container-lowest border border-surface-variant rounded-xl p-lg shadow-sm flex flex-col gap-lg">
<!-- Header -->
<header class="text-center flex flex-col gap-sm">
<img alt="Ceipts Logo" class="h-24 w-auto mx-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBx3wf4l35aYodJFtkqGxWeBPFwO3DCttHEeL9GgJv1tzXmGy0QK1JbUeMS9sDE5Lr5xodacXgvxfa1ZZzBXZHp-7LMF7I3RzsgbREzSm45atVZws5YSb7-Toth7mMhmHAwa_IrGAAPOtmCJ5qUY02SmOIpKMdUKFI9dJe3VC-ZpdDVW4I_-tnwy8qyYmlPb6JsrHxzXQpig07crDAqNhmRwG0VqlYkN2Lz0tbwbbtDkhlpyS3oT5HBqRtyy1u6fvf8BX7GdWLM_V0">
<p class="font-body-lg text-body-lg text-on-surface-variant">Create an account to manage your shared expenses.</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="flex flex-col gap-md">
<!-- Full Name Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="fullName">Full Name</label>
<input class="w-full h-12 px-md border border-outline-variant rounded-md bg-transparent text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="fullName" name="fullName" placeholder="John Doe" required="" type="text">
</div>
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">Email Address</label>
<input class="w-full h-12 px-md border border-outline-variant rounded-md bg-transparent text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" name="email" placeholder="name@example.com" required="" type="email">
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="password">Password</label>
<input class="w-full h-12 px-md border border-outline-variant rounded-md bg-transparent text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm">
<div class="flex items-center h-5 mt-xs">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary focus:ring-2 focus:ring-offset-0 cursor-pointer" id="terms" name="terms" required="" type="checkbox">
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                    I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                </label>
</div>
<!-- Primary Action -->
<button class="w-full h-12 flex items-center justify-center bg-primary text-on-primary font-label-lg text-label-lg rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm active:scale-[0.98]" type="submit" onclick="window.location.href='{{DATA:SCREEN:SCREEN_22}}'">
                Create Account
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md">
<div class="flex-1 h-px bg-surface-variant"></div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Or sign up with</span>
<div class="flex-1 h-px bg-surface-variant"></div>
</div>
<!-- Social Signup -->
<div class="flex flex-col md:flex-row gap-md">
<button class="flex-1 h-12 flex items-center justify-center gap-sm border border-outline-variant bg-surface-container-lowest rounded-full text-on-surface font-label-lg text-label-lg hover:bg-surface-container-low transition-colors active:scale-[0.98]">
                Google
            </button>
<button class="flex-1 h-12 flex items-center justify-center gap-sm border border-outline-variant bg-surface-container-lowest rounded-full text-on-surface font-label-lg text-label-lg hover:bg-surface-container-low transition-colors active:scale-[0.98]">
                Apple
            </button>
</div>
<!-- Footer Link -->
<div class="text-center font-body-md text-body-md text-on-surface-variant pt-sm">
            Already have an account? <a class="text-primary font-medium hover:underline" href="{{DATA:SCREEN:SCREEN_34}}">Log In</a>
</div>
