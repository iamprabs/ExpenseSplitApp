<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        
        /* Subtle entrance animation for the success state */
        @keyframes scaleUpFade {
            0% { transform: scale(0.95) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        @keyframes popIcon {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-entrance { animation: scaleUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-icon-pop { animation: popIcon 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-lg antialiased min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden">
<!-- 
      Semantic Shell Suppression: 
      As per the strict logic rule for 'Linear/Transactional' and 'Success/Confirmation' splash screens, 
      the navigation shell (TopAppBar & BottomNavBar) is intentionally excluded to focus entirely on the confirmation canvas.
    -->
<!-- Main Content Canvas -->
<main class="w-full max-w-[400px] flex flex-col items-center gap-xl animate-entrance opacity-0">
<!-- Success Animation/Icon Header -->
<div class="flex flex-col items-center text-center gap-md w-full">
<div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center mb-sm shadow-[0_4px_20px_rgba(109,254,156,0.2)] animate-icon-pop opacity-0" style="animation-delay: 0.1s;">
<span class="material-symbols-outlined text-[48px] text-on-secondary-container" data-weight="fill">check_circle</span>
</div>
<div class="flex flex-col gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">
                    Payment Successful!
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-sm">
                    Your balance with Sarah Jenkins has been updated.
                </p>
</div>
</div>
<!-- Summary Details Card (Surface 1) -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-outline-variant p-lg flex flex-col shadow-sm relative overflow-hidden group">
<!-- Decorative subtle top highlight -->
<div class="absolute top-0 left-0 w-full h-1 bg-secondary-container"></div>
<div class="flex flex-col gap-md mt-xs">
<!-- Amount (Emphasized) -->
<div class="flex justify-between items-end pb-md border-b border-surface-variant">
<span class="font-label-lg text-label-lg text-outline">Amount Paid</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-secondary-fixed-dim tracking-tight">
                        $120.50
                    </span>
</div>
<!-- Paid To -->
<div class="flex justify-between items-center py-sm border-b border-surface-variant">
<span class="font-label-lg text-label-lg text-outline">Paid To</span>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden">
<!-- Using a generic person icon instead of injecting an image to keep it lightweight and abstract -->
<span class="material-symbols-outlined text-[20px] text-on-surface-variant">person</span>
</div>
<span class="font-title-lg text-title-lg text-on-surface text-base">Sarah Jenkins</span>
</div>
</div>
<!-- Method -->
<div class="flex justify-between items-center py-sm border-b border-surface-variant">
<span class="font-label-lg text-label-lg text-outline">Method</span>
<span class="font-body-md text-body-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-outline">account_balance</span>
                        Venmo
                    </span>
</div>
<!-- Date -->
<div class="flex justify-between items-center pt-sm">
<span class="font-label-lg text-label-lg text-outline">Date</span>
<span class="font-body-md text-body-md text-on-surface">Oct 24, 2023</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-md mt-sm">
<!-- Primary Action -->
<button class="w-full h-12 rounded-full bg-primary text-on-primary font-label-lg text-label-lg flex items-center justify-center transition-transform active:scale-95 hover:bg-on-primary-fixed shadow-[0_4px_12px_rgba(19,27,80,0.15)]" onclick="window.location.href='{{DATA:SCREEN:SCREEN_22}}'">
                Back to Dashboard
            </button>
<!-- Secondary Action -->
<button class="w-full h-12 rounded-full border border-outline text-primary font-label-lg text-label-lg flex items-center justify-center gap-2 transition-colors hover:bg-surface-container active:scale-95">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
                Share Receipt
            </button>
</div>
</main>
