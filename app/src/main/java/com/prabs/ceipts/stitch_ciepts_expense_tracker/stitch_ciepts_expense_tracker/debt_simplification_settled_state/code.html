<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-opt');
            const linesBefore = document.getElementById('lines-before');
            const linesAfter = document.getElementById('lines-after');
            const statBanner = document.getElementById('stat-banner');
            let isOptimized = false;

            toggleBtn.addEventListener('click', () => {
                isOptimized = !isOptimized;
                
                if (isOptimized) {
                    linesBefore.classList.add('opacity-0');
                    setTimeout(() => {
                        linesBefore.classList.add('hidden');
                        linesAfter.classList.remove('hidden');
                        // trigger reflow
                        void linesAfter.offsetWidth;
                        linesAfter.classList.remove('opacity-0');
                        
                        statBanner.classList.remove('hidden');
                        void statBanner.offsetWidth;
                        statBanner.classList.remove('opacity-0');
                        
                        toggleBtn.innerHTML = '<span class="material-symbols-outlined text-[16px] mr-xs">undo</span> Show Original';
                        toggleBtn.classList.replace('bg-secondary-container', 'bg-surface-variant');
                        toggleBtn.classList.replace('text-on-secondary-container', 'text-on-surface-variant');
                    }, 300);
                } else {
                    linesAfter.classList.add('opacity-0');
                    statBanner.classList.add('opacity-0');
                    setTimeout(() => {
                        linesAfter.classList.add('hidden');
                        statBanner.classList.add('hidden');
                        linesBefore.classList.remove('hidden');
                        void linesBefore.offsetWidth;
                        linesBefore.classList.remove('opacity-0');
                        
                        toggleBtn.innerHTML = '<span class="material-symbols-outlined text-[16px] mr-xs">swap_horiz</span> Show Simplified';
                        toggleBtn.classList.replace('bg-surface-variant', 'bg-secondary-container');
                        toggleBtn.classList.replace('text-on-surface-variant', 'text-on-secondary-container');
                    }, 300);
                }
            });
        });
    </script>
