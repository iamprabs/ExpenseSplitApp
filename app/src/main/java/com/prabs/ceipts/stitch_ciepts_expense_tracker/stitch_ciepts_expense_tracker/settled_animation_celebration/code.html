<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_39" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_39');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create celebratory particles (confetti-like)
const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.01);
const colors = [0x2a3166, 0x00c853, 0x2979ff, 0xffd600];
const particles = [];

for (let i = 0; i < 150; i++) {
    const material = new THREE.MeshPhongMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        side: THREE.DoubleSide
    });
    const particle = new THREE.Mesh(geometry, material);
    
    particle.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10 + 2,
        (Math.random() - 0.5) * 5
    );
    
    particle.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    
    particle.userData = {
        velocity: new THREE.Vector3((Math.random() - 0.5) * 0.05, -Math.random() * 0.05 - 0.02, (Math.random() - 0.5) * 0.02),
        rotationSpeed: new THREE.Vector3(Math.random() * 0.1, Math.random() * 0.1, Math.random() * 0.1)
    };
    
    scene.add(particle);
    particles.push(particle);
}

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 0.8);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

function animate() {
    requestAnimationFrame(animate);
    
    particles.forEach(p => {
        p.position.add(p.userData.velocity);
        p.rotation.x += p.userData.rotationSpeed.x;
        p.rotation.y += p.userData.rotationSpeed.y;
        
        // Reset particles that go off screen
        if (p.position.y < -5) {
            p.position.y = 5;
            p.position.x = (Math.random() - 0.5) * 10;
        }
    });
    
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    const newWidth = container.clientWidth || window.innerWidth;
    const newHeight = container.clientHeight || window.innerHeight;
    camera.aspect = newWidth / newHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(newWidth, newHeight);
});

})();
</script>
